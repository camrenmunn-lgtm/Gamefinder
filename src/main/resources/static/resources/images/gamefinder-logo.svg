<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6db33f"/>
      <stop offset="100%" style="stop-color:#4a9a1f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#d4a012"/>
    </linearGradient>
  </defs>

  <rect width="500" height="220" rx="16" ry="16" fill="url(#bgGrad)"/>
  <rect width="500" height="220" rx="16" ry="16" fill="url(#scanlines)" opacity="0.4"/>

  <g stroke="#1a2a4a" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="55" x2="500" y2="55"/>
    <line x1="0" y1="110" x2="500" y2="110"/>
    <line x1="0" y1="165" x2="500" y2="165"/>
    <line x1="125" y1="0" x2="125" y2="220"/>
    <line x1="250" y1="0" x2="250" y2="220"/>
    <line x1="375" y1="0" x2="375" y2="220"/>
  </g>

  <!-- Controller body -->
  <g transform="translate(52, 85)" filter="url(#glow)">
    <path d="M-38,0 Q-38,-22 -20,-26 L20,-26 Q38,-26 38,0 Q38,20 20,28 Q0,34 -20,28 Q-38,20 -38,0 Z"
          fill="#1e3a5f" stroke="#6db33f" stroke-width="1.5"/>
    <rect x="-22" y="-10" width="8" height="20" rx="2" fill="#6db33f" opacity="0.9"/>
    <rect x="-26" y="-6" width="16" height="8" rx="2" fill="#6db33f" opacity="0.9"/>
    <circle cx="16" cy="-8" r="4.5" fill="#e74c3c" opacity="0.9"/>
    <circle cx="24" cy="0" r="4.5" fill="#f5c842" opacity="0.9"/>
    <circle cx="16" cy="8" r="4.5" fill="#6db33f" opacity="0.9"/>
    <circle cx="8" cy="0" r="4.5" fill="#3498db" opacity="0.9"/>
    <rect x="-4" y="-3" width="8" height="3" rx="1.5" fill="#4a7fa5"/>
    <rect x="-4" y="2" width="8" height="3" rx="1.5" fill="#4a7fa5"/>
    <path d="M-28,-18 Q-10,-28 10,-26" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none"/>
  </g>

  <!-- Magnifier -->
  <g transform="translate(52, 85)">
    <circle cx="22" cy="-18" r="12" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <line x1="31" y1="-9" x2="40" y2="0" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="-22" r="3" fill="rgba(245,200,66,0.15)"/>
  </g>

  <text x="108" y="115"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="58" font-weight="900" letter-spacing="-1"
        fill="url(#greenGrad)" filter="url(#textGlow)">GAME</text>

  <text x="108" y="158"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="44" font-weight="700" letter-spacing="8"
        fill="#e8f4fd" opacity="0.92">FINDER</text>

  <rect x="108" y="168" width="280" height="2" rx="1" fill="url(#greenGrad)" opacity="0.7"/>

  <text x="108" y="190"
        font-family="'Courier New', monospace"
        font-size="11" letter-spacing="3"
        fill="#6db33f" opacity="0.75">COLLECT · DISCOVER · REVIEW</text>

  <g fill="#6db33f" opacity="0.5">
    <rect x="108" y="72" width="3" height="3"/>
    <rect x="114" y="72" width="3" height="3"/>
    <rect x="120" y="72" width="3" height="3"/>
  </g>

  <g stroke="#6db33f" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M8,8 L8,20 M8,8 L20,8"/>
    <path d="M492,8 L492,20 M492,8 L480,8"/>
    <path d="M8,212 L8,200 M8,212 L20,212"/>
    <path d="M492,212 L492,200 M492,212 L480,212"/>
  </g>

  <rect width="500" height="220" rx="16" ry="16"
        fill="none" stroke="#6db33f" stroke-width="1" opacity="0.3"/>
</svg>
