<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'games')}">

<body>

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Reviews</h2>
    <a href="/games" class="btn btn-outline-secondary btn-sm">
      <i class="fa fa-gamepad me-1"></i> Browse Games
    </a>
  </div>

  <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-5 text-muted">
    <i class="fa fa-star fa-3x d-block mb-3"></i>
    <p class="lead">You haven't written any reviews yet.</p>
    <a href="/games" class="btn btn-outline-primary">Browse games to review</a>
  </div>

  <div th:unless="${#lists.isEmpty(reviews)}">
    <div class="card mb-3 shadow-sm" th:each="review : ${reviews}">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h5 class="mb-1">
              <a th:href="@{/games/__${review.game.id}__}"
                 th:text="${review.game.name}"
                 class="text-decoration-none"></a>
            </h5>
            <div class="mb-1">
              <span th:each="i : ${#numbers.sequence(1, 5)}">
                <i class="fa" th:classappend="${i <= review.rating} ? 'fa-star text-warning' : 'fa-star-o text-muted'"></i>
              </span>
              <strong class="ms-1" th:text="${review.title}"></strong>
            </div>
            <p class="mb-1 text-muted" th:text="${review.body}"></p>
            <small class="text-muted"
                   th:text="'Reviewed on ' + ${#temporals.format(review.createdAt, 'MMM d, yyyy')}"></small>
          </div>
          <div class="d-flex gap-2 ms-3">
            <a th:href="@{/collector/reviews/__${review.id}__/edit}"
               class="btn btn-sm btn-outline-secondary">Edit</a>
            <form th:action="@{/collector/reviews/__${review.id}__/delete}"
                  method="post"
                  onsubmit="return confirm('Delete this review?')">
              <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
