<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'games')}">

<body>

<div class="container mt-4" style="max-width: 680px;">

  <a th:href="@{/games/__${game.id}__}" class="text-muted small text-decoration-none">
    &larr; Back to <span th:text="${game.name}"></span>
  </a>

  <h2 class="mt-2 mb-1" th:text="${review.isNew()} ? 'Write a Review' : 'Edit Your Review'"></h2>
  <p class="text-muted mb-4">
    <i class="fa fa-gamepad me-1"></i>
    <span th:text="${game.name}"></span>
    (<span th:text="${game.releaseYear}"></span>)
  </p>

  <form th:action="${review.isNew()}
                    ? '/games/' + ${game.id} + '/reviews/new'
                    : '/collector/reviews/' + ${review.id} + '/edit'"
        th:object="${review}"
        method="post">

    <!-- Rating -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Rating <span class="text-danger">*</span></label>
      <div class="d-flex gap-3 flex-wrap">
        <div class="form-check form-check-inline" th:each="i : ${#numbers.sequence(1, 5)}">
          <input class="form-check-input" type="radio"
                 th:id="'rating' + ${i}"
                 th:field="*{rating}"
                 th:value="${i}">
          <label class="form-check-label" th:for="'rating' + ${i}">
            <span th:text="${i}"></span> <i class="fa fa-star text-warning"></i>
          </label>
        </div>
      </div>
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('rating')}"
           th:errors="*{rating}"></div>
    </div>

    <!-- Title -->
    <div class="mb-3">
      <label for="title" class="form-label fw-semibold">Review Title <span class="text-danger">*</span></label>
      <input type="text" id="title" th:field="*{title}"
             class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
             placeholder="Sum it up in a sentence">
      <div class="invalid-feedback" th:errors="*{title}"></div>
    </div>

    <!-- Body -->
    <div class="mb-4">
      <label for="body" class="form-label fw-semibold">Review</label>
      <textarea id="body" th:field="*{body}"
                class="form-control" rows="6"
                th:classappend="${#fields.hasErrors('body')} ? 'is-invalid'"
                placeholder="Share your thoughts about this game..."></textarea>
      <div class="invalid-feedback" th:errors="*{body}"></div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <span th:text="${review.isNew()} ? 'Post Review' : 'Save Changes'"></span>
      </button>
      <a th:href="@{/games/__${game.id}__}" class="btn btn-outline-secondary">Cancel</a>
    </div>

  </form>
</div>

</body>
</html>
