<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout (~{::body},'games')}">

<body>

<h2 th:text="#{games}">Games</h2>

<!-- Add Game button — ADMIN only -->
<a sec:authorize="hasAuthority('ADMIN')"
   th:href="@{/games/new}" class="btn btn-primary mb-3" th:text="#{addGame}">Add Game</a>

<table id="games" class="table table-striped">
  <thead>
  <tr>
    <th th:text="#{name}">Title</th>
    <th th:text="#{gameType}">Type</th>
    <th th:text="#{releaseYear}">Release Year</th>
    <th th:text="#{publisher}">Publisher</th>
    <th th:text="#{rarityScore}">Rarity</th>
    <th th:text="#{avgValue}">Avg Value</th>
    <th sec:authorize="hasAuthority('ADMIN')">Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="game : ${listGames}">
    <td>
      <a th:href="@{/games/__${game.id}__}" th:text="${game.name}"></a>
    </td>
    <td th:text="${game.gameType}"/>
    <td th:text="${game.releaseYear}"/>
    <td th:text="${game.publisher != null ? game.publisher.name : ''}"/>
    <td th:text="${game.rarityScore}"/>
    <td th:text="${game.avgValue}"/>
    <td sec:authorize="hasAuthority('ADMIN')">
      <a th:href="@{/games/__${game.id}__/edit}" class="btn btn-sm btn-outline-secondary me-1">Edit</a>
      <form th:action="@{/games/__${game.id}__/delete}" method="post" class="d-inline"
            onsubmit="return confirm('Delete this game?')">
        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<div th:if="${totalPages > 1}">
  <span th:text="#{pages}">Pages:</span>
  <span>[</span>
  <span th:each="i: ${#numbers.sequence(1, totalPages)}">
    <a th:if="${currentPage != i}" th:href="@{'/games?page=' + ${i}}">[[${i}]]</a>
    <span th:unless="${currentPage != i}">[[${i}]]</span>
  </span>
  <span>] </span>
  <span>
    <a th:if="${currentPage > 1}" th:href="@{'/games?page=1'}" th:title="#{first}" class="fa fa-fast-backward"></a>
    <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>
  </span>
  <span>
    <a th:if="${currentPage > 1}" th:href="@{'/games?page=__${currentPage - 1}__'}" th:title="#{previous}" class="fa fa-step-backward"></a>
    <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>
  </span>
  <span>
    <a th:if="${currentPage < totalPages}" th:href="@{'/games?page=__${currentPage + 1}__'}" th:title="#{next}" class="fa fa-step-forward"></a>
    <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>
  </span>
  <span>
    <a th:if="${currentPage < totalPages}" th:href="@{'/games?page=__${totalPages}__'}" th:title="#{last}" class="fa fa-fast-forward"></a>
    <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
  </span>
</div>

</body>
</html>
