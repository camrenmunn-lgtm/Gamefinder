<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout (~{::body},'games')}">

<body>

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <a href="/collector/lists" class="text-muted small text-decoration-none">
        &larr; My Lists
      </a>
      <h2 class="mb-0" th:text="${gameList.listName}"></h2>
      <span class="badge bg-secondary me-1" th:text="${gameList.listType}"></span>
      <span class="badge"
            th:classappend="${gameList.isPublic} ? 'bg-success' : 'bg-light text-dark border'"
            th:text="${gameList.isPublic} ? 'Public' : 'Private'"></span>
    </div>
    <div class="d-flex gap-2">
      <a th:href="@{/collector/lists/__${gameList.id}__/edit}"
         class="btn btn-outline-secondary btn-sm">Edit List</a>
      <form th:action="@{/collector/lists/__${gameList.id}__/delete}"
            method="post"
            onsubmit="return confirm('Are you sure you want to delete this list?')">
        <button type="submit" class="btn btn-outline-danger btn-sm">Delete List</button>
      </form>
    </div>
  </div>

  <p class="text-muted" th:if="${gameList.description}" th:text="${gameList.description}"></p>

<!--  &lt;!&ndash; Add game form &ndash;&gt;-->
<!--  <div class="card mb-4">-->
<!--    <div class="card-header fw-semibold">Add a Game</div>-->
<!--    <div class="card-body">-->
<!--      <form th:action="@{/collector/lists/__${gameList.id}__/games/add}"-->
<!--            method="post"-->
<!--            class="d-flex gap-2">-->
<!--        <input type="number" name="gameId" placeholder="Game ID"-->
<!--               class="form-control form-control-sm" style="max-width:160px;" required>-->
<!--        <button type="submit" class="btn btn-sm btn-primary">Add</button>-->
<!--      </form>-->
<!--      <div class="form-text">Enter the game's ID number. You can find it on the game detail page.</div>-->
<!--    </div>-->
<!--  </div>-->

  <h5 class="mb-3">Games in this list (<span th:text="${gameList.games.size()}"></span>)</h5>

  <div th:if="${gameList.games.isEmpty()}" class="text-muted fst-italic mb-3">
    No games added yet.
  </div>

  <div class="table-responsive" th:unless="${gameList.games.isEmpty()}">
    <table class="table table-hover align-middle">
      <thead class="table-light">
      <tr>
        <th>Title</th>
        <th>Type</th>
        <th>Year</th>
        <th>Rarity</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="game : ${gameList.games}">
        <td>
          <a th:href="@{/games/__${game.id}__}" th:text="${game.name}"></a>
        </td>
        <td th:text="${game.gameType}"></td>
        <td th:text="${game.releaseYear}"></td>
        <td th:text="${game.rarityScore}"></td>
        <td>
          <form th:action="@{/collector/lists/__${gameList.id}__/games/__${game.id}__/remove}"
                method="post">
            <button type="submit" class="btn btn-sm btn-outline-danger"
                    onclick="return confirm('Remove this game from the list?')">
              Remove
            </button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

</div>

</body>
</html>
