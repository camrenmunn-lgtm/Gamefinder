<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout (~{::body},'games')}">

<body>

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Publishers</h2>
    <a href="/admin/publishers/new" class="btn btn-primary">
      <i class="fa fa-plus me-1"></i> Add Publisher
    </a>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-light">
      <tr>
        <th>Name</th>
        <th>Country</th>
        <th>Founded</th>
        <th>Website</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="publisher : ${publishers}">
        <td>
          <a th:href="@{/admin/publishers/__${publisher.id}__}"
             th:text="${publisher.name}" class="text-decoration-none fw-semibold"></a>
        </td>
        <td th:text="${publisher.publisherCountry} ?: '—'"></td>
        <td th:text="${publisher.foundedYear} ?: '—'"></td>
        <td>
          <a th:if="${publisher.publisherSite}"
             th:href="${publisher.publisherSite}"
             target="_blank"
             class="text-truncate d-block" style="max-width:200px;"
             th:text="${publisher.publisherSite}"></a>
          <span th:unless="${publisher.publisherSite}" class="text-muted">—</span>
        </td>
        <td class="text-end">
          <a th:href="@{/admin/publishers/__${publisher.id}__/edit}"
             class="btn btn-sm btn-outline-secondary me-1">Edit</a>
          <form th:action="@{/admin/publishers/__${publisher.id}__/delete}"
                method="post" class="d-inline"
                onsubmit="return confirm('Delete this publisher?')">
            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <nav th:if="${totalPages > 1}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/publishers(page=${currentPage - 1})}">Previous</a>
      </li>
      <li class="page-item"
          th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:classappend="${i == currentPage} ? 'active'">
        <a class="page-link" th:href="@{/admin/publishers(page=${i})}" th:text="${i}"></a>
      </li>
      <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/publishers(page=${currentPage + 1})}">Next</a>
      </li>
    </ul>
  </nav>

</div>

</body>
</html>
