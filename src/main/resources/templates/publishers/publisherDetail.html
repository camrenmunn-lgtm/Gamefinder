<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'games')}">

<body>

<div class="container mt-4">

  <a href="/admin/publishers" class="text-muted small text-decoration-none">&larr; All Publishers</a>

  <div class="d-flex justify-content-between align-items-start mt-2 mb-4">
    <h2 class="mb-0" th:text="${publisher.name}"></h2>
    <div class="d-flex gap-2">
      <a th:href="@{/admin/publishers/__${publisher.id}__/edit}"
         class="btn btn-outline-secondary btn-sm">Edit</a>
      <form th:action="@{/admin/publishers/__${publisher.id}__/delete}"
            method="post"
            onsubmit="return confirm('Delete this publisher? This will fail if games are assigned to them.')">
        <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
      </form>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-3">Country</dt>
        <dd class="col-sm-9" th:text="${publisher.publisherCountry} ?: '—'"></dd>

        <dt class="col-sm-3">Founded</dt>
        <dd class="col-sm-9" th:text="${publisher.foundedYear} ?: '—'"></dd>

        <dt class="col-sm-3">Website</dt>
        <dd class="col-sm-9">
          <a th:if="${publisher.publisherSite}"
             th:href="${publisher.publisherSite}"
             th:text="${publisher.publisherSite}"
             target="_blank"></a>
          <span th:unless="${publisher.publisherSite}">—</span>
        </dd>

        <dt class="col-sm-3">Description</dt>
        <dd class="col-sm-9" th:text="${publisher.publisherDescription} ?: '—'"></dd>
      </dl>
    </div>
  </div>

  <h5 class="mb-3">Games by this Publisher (<span th:text="${publisher.games.size()}"></span>)</h5>

  <div th:if="${publisher.games.isEmpty()}" class="text-muted fst-italic">
    No games assigned to this publisher yet.
  </div>

  <div class="table-responsive" th:unless="${publisher.games.isEmpty()}">
    <table class="table table-sm table-hover">
      <thead class="table-light">
      <tr>
        <th>Title</th>
        <th>Type</th>
        <th>Year</th>
        <th>Rarity</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="game : ${publisher.games}">
        <td th:text="${game.name}"></td>
        <td th:text="${game.gameType}"></td>
        <td th:text="${game.releaseYear}"></td>
        <td th:text="${game.rarityScore}"></td>
        <td>
          <a th:href="@{/games/__${game.id}__}" class="btn btn-sm btn-outline-primary">View</a>
          <a th:href="@{/games/__${game.id}__/edit}" class="btn btn-sm btn-outline-secondary">Edit</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

</div>

</body>
</html>
